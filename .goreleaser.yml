version: 2

builds:
  - main: ./cmd/nova/
    binary: nova
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      # CGO cross-compilation needs special setup; build native only.
      - goos: linux
        goarch: arm64
    hooks:
      post:
        # Sign macOS binaries with virtualization entitlement.
        - cmd: >-
            {{ if eq .Os "darwin" }}
            codesign --entitlements entitlements.plist --force -s - {{ .Path }}
            {{ end }}

archives:
  - format: tar.gz
    name_template: "nova_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: tripleclabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/tripleclabs/nova"
    description: "Next-generation local VM orchestrator — a modern replacement for Vagrant"
    license: "MIT"
    dependencies:
      - name: qemu
    test: |
      assert_match "nova", shell_output("#{bin}/nova version")
