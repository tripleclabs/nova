version: 2

builds:
  - main: ./cmd/nova/
    binary: nova
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      # CGO cross-compilation needs special setup; build native only.
      - goos: linux
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "nova_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
