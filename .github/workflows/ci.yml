name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install qemu-img (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qemu-utils
      - name: Install qemu-img (macOS)
        if: runner.os == 'macOS'
        run: brew install qemu
      - run: make test

  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.version=${{ github.sha }}" -o nova-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/nova/
      - uses: actions/upload-artifact@v4
        with:
          name: nova-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nova-${{ matrix.goos }}-${{ matrix.goarch }}
